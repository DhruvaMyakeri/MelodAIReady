<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Piano Player</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <!-- Tone.js for Audio Synthesis -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <style>
    :root {
      --bg: #0f111a;
      --surface: rgba(25, 28, 41, 0.6);
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --white-key: #ffffff;
      --black-key: #1e1e1e;
      --active-key: #0ea5e9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 1000px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .controls {
      display: flex;
      gap: 20px;
      align-items: center;
      width: 100%;
      background: rgba(0,0,0,0.2);
      padding: 20px;
      border-radius: 16px;
    }

    button {
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px -10px var(--primary-glow);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px var(--primary-glow);
      filter: brightness(1.1);
    }
    
    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      font-weight: 500;
      color: var(--text-dim);
      font-size: 1rem;
    }

    /* Progress bar */
    .progress-container {
      flex-grow: 1;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    
    .progress-bar {
      position: absolute;
      top: 0; left: 0; height: 100%;
      background: linear-gradient(90deg, #6366f1, #0ea5e9);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Piano Keyboard layout */
    .piano {
      display: flex;
      position: relative;
      height: 180px;
      width: 100%;
      margin-top: 20px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      background: #111;
      padding: 2px;
    }

    .key {
      position: relative;
      flex: 1;
      background: var(--white-key);
      border: 1px solid #ccc;
      border-radius: 0 0 6px 6px;
      margin: 0 1px;
      transition: background 0.1s;
      box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1);
    }

    .key.black {
      position: absolute;
      background: var(--black-key);
      width: 2.5%;
      height: 60%;
      border-radius: 0 0 4px 4px;
      top: 0;
      transform: translateX(-50%);
      z-index: 10;
      border: none;
      box-shadow: inset 0 -3px 5px rgba(255,255,255,0.2), 2px 2px 5px rgba(0,0,0,0.5);
    }

    .active {
      background: var(--active-key) !important;
      box-shadow: 0 0 20px var(--primary-glow), inset 0 -5px 10px rgba(0,0,0,0.2);
    }

    .current-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      color: #38bdf8;
      font-weight: 700;
      min-width: 80px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Neural Piano Player</h1>
    
    <div class="controls">
      <button id="playBtn">Load & Play</button>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="current-note" id="noteDisplay">--</div>
      <div class="status" id="statusText">Ready</div>
    </div>

    <div class="piano" id="pianoKeyboard">
      <!-- Generated via JS -->
    </div>
  </div>

  <script src="transcription.js"></script>
  <script>
    // ─── PIANO KEYBOARD UI ───────────────────────────────────
    const keyboardEl = document.getElementById('pianoKeyboard');
    const notesStr = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    
    // We will render octaves 1 through 6
    const octaves = [1, 2, 3, 4, 5, 6];
    let keyElements = {}; // Map full note e.g. "C4" to element

    let whiteCount = 0;
    
    octaves.forEach(oct => {
      notesStr.forEach((note) => {
        const fullNote = `${note}${oct}`;
        const isBlack = note.includes('#');

        const el = document.createElement('div');
        el.className = `key ${isBlack ? 'black' : 'white'}`;
        el.id = `key-${fullNote}`;
        
        if (!isBlack) {
          whiteCount++;
        }
        
        keyElements[fullNote] = el;
        keyboardEl.appendChild(el);
      });
    });

    // Position black keys properly
    let currentWhiteIndex = 0;
    octaves.forEach(oct => {
      notesStr.forEach((note) => {
        const fullNote = `${note}${oct}`;
        const isBlack = note.includes('#');
        const el = keyElements[fullNote];

        if (isBlack) {
          // Absolute position relative to total white keys
          el.style.left = `${(currentWhiteIndex / whiteCount) * 100}%`;
        } else {
          currentWhiteIndex++;
        }
      });
    });

    // ─── TONE.JS & PLAYBACK LOGIC ────────────────────────────
    const playBtn = document.getElementById('playBtn');
    const statusText = document.getElementById('statusText');
    const noteDisplay = document.getElementById('noteDisplay');
    const progressBar = document.getElementById('progressBar');
    
    let isPlaying = false;
    let sequenceData = [];
    let currentPart = null;

    // We use a high quality default synth, but added a little reverb and chorus for a premium sound
    const reverb = new Tone.Reverb({ decay: 2.5, wet: 0.3 }).toDestination();
    const synth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "triangle" },
      envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 }
    }).connect(reverb);
    synth.volume.value = -5; // prevent clipping

    async function fetchTranscription() {
      try {
        sequenceData = window.PRELOADED_SEQUENCE;
        if (!sequenceData || sequenceData.length === 0) throw new Error("Data empty");
        return true;
      } catch (err) {
        statusText.innerText = "Error: Sequence load failed.";
        return false;
      }
    }

    playBtn.addEventListener('click', async () => {
      if (isPlaying) {
        Tone.Transport.stop();
        Tone.Transport.cancel();
        isPlaying = false;
        playBtn.innerText = "Play";
        statusText.innerText = "Stopped";
        progressBar.style.width = "0%";
        return;
      }

      statusText.innerText = "Loading Audio Context...";
      await Tone.start();

      if (sequenceData.length === 0) {
        const loaded = await fetchTranscription();
        if (!loaded) return;
      }

      statusText.innerText = "Playing...";
      playBtn.innerText = "Stop";
      isPlaying = true;

      // Find total duration for progress bar
      const maxTime = sequenceData[sequenceData.length - 1].time + sequenceData[sequenceData.length - 1].duration;

      // Create a Tone Part with all the notes
      const notesToPlay = sequenceData.map(item => {
        return {
          time: item.time,
          note: item.note,
          duration: item.duration || 0.5
        };
      });

      if (currentPart) currentPart.dispose();

      currentPart = new Tone.Part((time, value) => {
        // Trigger sound
        synth.triggerAttackRelease(value.note, value.duration, time);
        
        // Schedule UI updates
        Tone.Draw.schedule(() => {
          noteDisplay.innerText = value.note;
          
          const keyEl = keyElements[value.note];
          if (keyEl) {
            keyEl.classList.add('active');
            setTimeout(() => {
              keyEl.classList.remove('active');
            }, value.duration * 1000);
          }

          // Update progress bar
          const percent = (value.time / maxTime) * 100;
          progressBar.style.width = `${percent}%`;
        }, time);

      }, notesToPlay).start(0);

      Tone.Transport.start();

      // Stop handling
      Tone.Transport.scheduleOnce(() => {
        isPlaying = false;
        playBtn.innerText = "Play";
        statusText.innerText = "Finished";
        progressBar.style.width = "100%";
      }, maxTime + 1);
    });
  </script>
</body>
</html>
